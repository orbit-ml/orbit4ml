site_name: orbit4ml
site_description: An open ecosystem for machine learning in space — libraries, frameworks, and tools for practitioners at the intersection of ML and space systems.
site_url: https://orbit-ml.github.io/orbit4ml
repo_url: https://github.com/orbit-ml/orbit4ml
repo_name: orbit-ml/orbit4ml
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/favicon.png
  palette:
    scheme: slate
    primary: black
    accent: indigo
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - content.code.copy
    - content.action.edit
    - toc.follow

nav:
  - Home: index.md
  - Tutorials:
    - tutorials/index.md
    - Getting Started: tutorials/getting_started.md
  - Documentation:
    - documentation/index.md
  - Examples:
    - examples/index.md
  - Community: community.md
  - Changelog: changelog.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/orbit-ml/orbit4ml
  analytics:
    provider: google
    property: G-XXXXXXXXXX

copyright: Copyright &copy; 2026 OrbitML — MIT License
